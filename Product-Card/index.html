<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean E-Commerce Site</title>

    <style>
        /* ================= RESET ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: lightslategray;
            font-family: Arial, sans-serif;
        }

        /* ================= HEADER ================= */
        header {
            position: sticky;
            top: 0;
            z-index: 10;

            display: flex;
            justify-content: space-evenly;
            align-items: center;

            padding: 18px 40px;
            /* spacing inside header */
            margin: 15px;

            border-radius: 50px;
            background: rgb(231, 231, 177);

            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            /* depth */
        }

        header h1 {
            font-size: 2.2rem;
            /* bigger title */
        }

        header button {
            padding: 12px 20px;
            /* bigger cart button */
            font-size: 1.1rem;
            font-weight: bold;

            background: darkblue;
            color: white;
            border: none;
            border-radius: 10px;

            cursor: pointer;
            transition: 0.3s;
        }

        /* hover effect */
        header button:hover {
            transform: scale(1.05);
            background: white;
            color: black;
            border: 1px solid black;
        }

        /* ================= GRID ================= */
        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

            gap: 30px;
            /* proper spacing between cards */
            padding: 20px;
        }

        /* ================= CARD ================= */
        .card {
            background: white;
            border-radius: 12px;
            height: 550px;
            padding: 15px;

            display: flex;
            flex-direction: column;
            /* gap: 12px; */
            gap: 30px;
            /* equal spacing inside card */

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* ================= IMAGE ================= */
        .imgbox {
            background: rgb(203, 219, 234);
            border-radius: 10px;

            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .imgbox img {
            max-width: 160px;
            /* height: 250px; */
        }

        /* ================= TEXT ================= */
        h3 {
            font-size: 1rem;
            min-height: 40px;
            /* keeps cards aligned */
        }

        p {
            font-size: 0.9rem;
            line-height: 1.4;
            font-weight: 500;
        }

        /* ================= PRICE + RATING ================= */
        .meta {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }

        /* ⭐ GOLD STAR */
        .star {
            color: gold;
            font-weight: bold;
        }

        /* ================= BUTTONS ================= */
        .buttons {
            display: flex;
            gap: 10px;
        }

        .buttons button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: darkblue;
            color: white;
            cursor: pointer;
            font-weight: 700;

        }

        /* ================= MOBILE ================= */
        @media(max-width:500px) {

            header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
                padding: 15px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            header button {
                width: 100%;
            }

            .buttons {
                flex-direction: column;
            }
        }

        /* ================= SKELETON ================= */
        .skeleton {
            height: 400px;
            border-radius: 12px;

            background: linear-gradient(90deg, #ddd 25%, #eee 50%, #ddd 75%);
            background-size: 400px 100%;

            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -400px 0
            }

            100% {
                background-position: 400px 0
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>E-Commerce - Grab Ur Products</h1>
        <button id="cart">🛒 Cart: 0</button>
    </header>

    <!-- PRODUCT CONTAINER -->
    <div id="container"></div>

    <script>

        const container = document.getElementById("container");
        const cart = document.getElementById("cart");

        let count = 0;

        /* ================= SKELETON ================= */
        function showSkeleton() {
            for (let i = 0; i < 8; i++) {
                let sk = document.createElement("div");
                sk.className = "skeleton";
                container.appendChild(sk);
            }
        }

        /* ================= FETCH PRODUCTS ================= */
        async function loadProducts() {

            showSkeleton(); // show loading UI first

            const res = await fetch("https://dummyjson.com/products/category/mobile-accessories");
            const data = await res.json();

            container.innerHTML = ""; // remove skeleton

            data.products.forEach(p => {

                const card = document.createElement("div");
                card.className = "card";

                const imgbox = document.createElement("div");
                imgbox.className = "imgbox";

                const img = document.createElement("img");
                img.src = p.images[0];

                const title = document.createElement("h3");
                title.innerText = p.title;

                const desc = document.createElement("p");
                desc.innerText = p.description;

                const meta = document.createElement("div");
                meta.className = "meta";

                const price = document.createElement("span");
                price.innerText = "₹ " + Math.round(p.price * 90);

                const rating = document.createElement("span");

                /* ⭐ create golden star */
                const star = document.createElement("span");
                star.innerText = " ★";
                star.className = "star";

                rating.innerText = p.rating;
                rating.appendChild(star);

                const btns = document.createElement("div");
                btns.className = "buttons";

                const buy = document.createElement("button");
                buy.innerText = "Buy";

                const add = document.createElement("button");
                add.innerText = "Add";

                /* CART LOGIC */
                add.onclick = () => {
                    count++;
                    cart.innerText = `🛒 Cart: ${count}`;
                };

                /* BUILD CARD */
                imgbox.appendChild(img);
                meta.append(price, rating);
                btns.append(buy, add);

                card.append(imgbox, title, desc, meta, btns);
                container.appendChild(card);
            });
        }

        loadProducts();

    </script>

</body>

</html>
